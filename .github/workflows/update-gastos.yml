name: Actualizar Gastos Diario

on:
  schedule:
    - cron: '0 14 * * *'   # 09:00 Ecuador (UTC-5)
  workflow_dispatch:         # también se puede lanzar manualmente desde GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install --quiet pywebpush

      - name: Actualizar gastos desde Gmail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          PUSH_MIN: '100'
        run: python scripts/update_gastos.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "JAYGASTOS Bot"
          git config user.email "bot@jaygastos.noreply"
          git add index.html
          if git diff --cached --quiet; then
            echo "Sin cambios nuevos."
          else
            git commit -m "Auto: gastos actualizados $(TZ=America/Guayaquil date +'%d %b %Y %H:%M')"
            git push
          fi
