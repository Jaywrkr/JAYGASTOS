<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gastos · Jay</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0D0D1A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JAYGASTOS">
<style>
:root{
  --bg:#0D0D1A;
  --card:#13121F;
  --card2:#181725;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#F4F3F7;
  --text-dim:#8B889C;
  --text-dim2:#5F5C70;
  --violet:#A78BFA;
  --green:#34D399;
  --orange:#FB923C;
  --red:#F87171;
  --yellow:#FBBF24;
  --blue:#60A5FA;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif;}
body{min-height:100vh;padding-bottom:60px;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

/* NAV */
.nav{position:sticky;top:0;z-index:50;background:rgba(13,13,26,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;gap:4px;padding:10px 16px;}
.nav-btn{flex:1;text-align:center;padding:10px 6px;border:none;background:transparent;color:var(--text-dim);font-weight:800;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;border-radius:10px;transition:all .15s;}
.nav-btn.active{background:var(--card2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border2);}

/* Barra superior segura para el notch del iPhone */
.topbar{padding-top:env(safe-area-inset-top);}

/* En móvil: navegación abajo tipo app */
@media (max-width:640px){
  .nav{position:fixed;top:auto;bottom:0;left:0;right:0;border-bottom:none;border-top:1px solid var(--border);padding:8px 12px calc(8px + env(safe-area-inset-bottom));gap:6px;}
  .nav-btn{padding:8px 4px;font-size:10px;}
  body{padding-bottom:calc(76px + env(safe-area-inset-bottom));}
  /* subir los botones flotantes por encima del nav */
  #lockToggle{bottom:calc(88px + env(safe-area-inset-bottom));}
  #pushToggle{bottom:calc(140px + env(safe-area-inset-bottom));}
  /* que los botones de acción no se desborden */
  .page-head{flex-direction:column;align-items:stretch;}
  .head-actions{flex-wrap:wrap;}
  .head-actions .icon-btn{flex:1;justify-content:center;}
}

.wrap{max-width:760px;margin:0 auto;padding:18px 16px 0;}

/* MONTH NAV */
.month-nav{max-width:760px;margin:14px auto 0;padding:0 16px;display:flex;align-items:center;justify-content:center;gap:14px;}
.month-nav .mn-btn{background:var(--card);border:1px solid var(--border2);color:var(--text);width:36px;height:36px;border-radius:10px;font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;line-height:1;}
.month-nav .mn-btn:disabled{opacity:0.3;cursor:default;}
.month-nav .mn-btn:not(:disabled):hover{background:var(--card2);border-color:var(--violet);}
.month-nav .mn-label{font-size:14px;font-weight:900;letter-spacing:0.05em;text-transform:uppercase;min-width:150px;text-align:center;}

/* HEADER */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;}
.page-title{font-size:22px;font-weight:900;letter-spacing:0.04em;text-transform:uppercase;margin:0;}
.page-sub{color:var(--text-dim);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;margin-top:3px;}
.head-actions{display:flex;gap:8px;flex-shrink:0;}
.icon-btn{background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:11px;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;padding:9px 12px;border-radius:10px;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.icon-btn:hover{background:var(--card2);}
.icon-btn.spinning .spin-ic{display:inline-block;animation:spin 0.8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* WIDGETS */
.widget-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.widget{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;}
.widget-label{font-size:9.5px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.widget-value{font-size:18px;font-weight:900;}

/* TOTAL CARD */
.total-card{background:linear-gradient(145deg,var(--card2),var(--card));border:1px solid var(--border2);border-radius:18px;padding:22px;margin-bottom:16px;}
.total-label{font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
.total-value{font-size:38px;font-weight:900;letter-spacing:-0.01em;}
.total-foot{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
.total-chip{font-size:11px;font-weight:700;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filters select,.filters input{background:var(--card);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:9px 11px;font-size:12px;font-weight:600;}
.filters select{flex:0 0 auto;}
.filters input{flex:1;min-width:120px;}
.filters select:focus,.filters input:focus{outline:none;border-color:var(--violet);}
.search-all{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--text-dim);white-space:nowrap;cursor:pointer;}
.search-all input{width:15px;height:15px;accent-color:var(--violet);}
.search-hint{font-size:11px;font-weight:700;color:var(--violet);background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);border-radius:10px;padding:9px 12px;margin-bottom:14px;}

/* DAY GROUP */
.day-group{margin-bottom:18px;}
.day-head{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 8px;}
.day-head-date{font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);}
.day-head-total{font-size:12px;font-weight:800;color:var(--text-dim2);}

.tx-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:opacity .15s;}
.tx-row.excluded{opacity:0.4;}
.tx-check{flex-shrink:0;width:18px;height:18px;accent-color:var(--violet);cursor:pointer;}
.tx-cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.tx-catsel{font-size:9.5px;font-weight:700;background:var(--card2);color:var(--text-dim);border:1px solid var(--border2);border-radius:5px;padding:1px 4px;max-width:130px;}
.tx-catsel:focus{outline:none;border-color:var(--violet);}
.tx-mid{flex:1;min-width:0;}
.tx-est{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:10.5px;color:var(--text-dim);font-weight:600;margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.acct-badge{font-size:9px;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;padding:2px 6px;border-radius:5px;background:var(--card2);}
.tx-note{font-size:9.5px;font-weight:800;letter-spacing:0.03em;text-transform:uppercase;color:var(--yellow);background:rgba(251,191,36,0.12);padding:2px 6px;border-radius:5px;}
.tx-dup{font-size:9.5px;font-weight:800;letter-spacing:0.03em;text-transform:uppercase;color:var(--red);background:rgba(248,113,113,0.14);padding:2px 6px;border-radius:5px;}
.tx-amt{font-size:14.5px;font-weight:800;flex-shrink:0;text-align:right;}
.tx-row.excluded .tx-amt{text-decoration:line-through;}
.tx-raw{font-size:10px;color:var(--text-dim2);font-weight:500;margin-top:1px;}

.empty{text-align:center;padding:50px 20px;color:var(--text-dim);font-size:13px;font-weight:600;}

/* FIJOS */
.fijo-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.fijo-row input[type=text]{flex:1;background:transparent;border:none;color:var(--text);font-size:13.5px;font-weight:700;padding:4px;}
.fijo-row input[type=number]{width:80px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-weight:700;padding:6px 8px;text-align:right;}
.fijo-row input:focus{outline:none;border-color:var(--violet);}
.del-btn{background:transparent;border:none;color:var(--text-dim2);font-size:16px;padding:4px 6px;border-radius:6px;flex-shrink:0;}
.del-btn:hover{color:var(--red);}
.add-fijo-btn{width:100%;background:var(--card);border:1px dashed var(--border2);color:var(--text-dim);font-weight:800;font-size:12px;letter-spacing:0.05em;text-transform:uppercase;padding:13px;border-radius:14px;margin-top:6px;}
.add-fijo-btn:hover{color:var(--violet);border-color:var(--violet);}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
.stat-label{font-size:10px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;}
.stat-value{font-size:20px;font-weight:900;}

/* ANALISIS */
.banner{border-radius:16px;padding:18px;margin-bottom:16px;border:1px solid var(--border2);}
.banner.ok{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.3);}
.banner.warn{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);}
.banner.over{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.3);}
.banner-title{font-size:14px;font-weight:900;letter-spacing:0.02em;text-transform:uppercase;margin-bottom:4px;}
.banner-sub{font-size:12px;color:var(--text-dim);font-weight:600;}

.bar-track{height:10px;background:var(--card2);border-radius:6px;overflow:hidden;margin:10px 0 4px;}
.bar-fill{height:100%;border-radius:6px;transition:width .4s;}
.bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim2);font-weight:700;}

.section-title{font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin:22px 4px 10px;}

.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:6px;}
.chart-bars{display:flex;align-items:flex-end;gap:2px;height:110px;position:relative;}
.chart-budget-line{position:absolute;left:0;right:0;border-top:2px dashed var(--text-dim2);}
.chart-bar{flex:1;background:var(--violet);border-radius:3px 3px 0 0;min-height:2px;opacity:0.85;}
.chart-bar.today{background:var(--green);opacity:1;}
.chart-bar.peak{background:var(--red);opacity:1;}
.insight-line{font-size:12px;font-weight:700;color:var(--text-dim);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 13px;margin:4px 0 6px;}
.insight-line b{color:var(--text);}
.donut-wrap{display:flex;align-items:center;gap:18px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;flex-wrap:wrap;}
.donut{width:140px;height:140px;flex-shrink:0;}
.donut-legend{flex:1;min-width:140px;display:flex;flex-direction:column;gap:6px;}
.donut-leg{font-size:11.5px;font-weight:700;color:var(--text-dim);display:flex;align-items:center;gap:7px;}
.chart-x{display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim2);font-weight:700;margin-top:6px;}

.cat-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:7px;}
.cat-icon{font-size:16px;flex-shrink:0;}
.cat-name{flex:1;font-size:12.5px;font-weight:700;}
.cat-bar-track{flex:1.4;height:7px;background:var(--card2);border-radius:4px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:4px;}
.cat-amt{font-size:12.5px;font-weight:800;width:62px;text-align:right;flex-shrink:0;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);color:var(--text);font-size:12px;font-weight:700;padding:11px 18px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1;}

::-webkit-scrollbar{width:0;height:0;}

/* PIN LOCK */
.lock-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;}
.lock-overlay.hidden{display:none;}
.lock-icon{font-size:46px;}
.lock-title{font-size:14px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);}
.lock-input{font-size:28px;font-weight:900;letter-spacing:0.5em;text-align:center;background:var(--card);border:1px solid var(--border2);border-radius:14px;color:var(--text);padding:14px 18px;width:200px;}
.lock-input:focus{outline:none;border-color:var(--violet);}
.lock-err{color:var(--red);font-size:12px;font-weight:700;height:16px;}
.lock-btn{position:fixed;bottom:20px;right:16px;z-index:60;width:44px;height:44px;border-radius:50%;background:var(--card);border:1px solid var(--border2);color:var(--text-dim);font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,0.4);}
.lock-btn:hover{color:var(--violet);border-color:var(--violet);}

/* COACH */
.coach-cfg{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;display:flex;flex-direction:column;gap:12px;}
.coach-field{display:flex;flex-direction:column;gap:5px;font-size:11px;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-dim);}
.coach-field input{background:var(--card2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-weight:700;padding:10px 12px;}
.coach-field input:focus{outline:none;border-color:var(--violet);}
.coach-note{font-size:12px;color:var(--text-dim);font-weight:600;line-height:1.5;}
.coach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.coach-btn{text-align:left;background:linear-gradient(145deg,var(--card2),var(--card));border:1px solid var(--border2);border-radius:16px;padding:16px;color:var(--text);transition:border-color .15s;}
.coach-btn:hover{border-color:var(--violet);}
.coach-btn[data-locked]{opacity:0.65;}
.coach-btn-ic{font-size:26px;margin-bottom:6px;}
.coach-btn-t{font-size:14px;font-weight:900;margin-bottom:3px;}
.coach-btn-d{font-size:11px;color:var(--text-dim);font-weight:600;line-height:1.45;}
.coach-out:empty{display:none;}
.coach-out{margin-top:6px;}
.coach-ta{width:100%;height:180px;background:var(--card2);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:11px;font-family:monospace;padding:12px;resize:vertical;margin-top:8px;}
.coach-actions{display:flex;gap:8px;margin-top:10px;}
.coach-actions .icon-btn{text-decoration:none;}
.coach-answer{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;font-size:13.5px;line-height:1.65;color:var(--text);}
@media (max-width:640px){ .coach-grid{grid-template-columns:1fr;} }

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:210;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal-card{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:22px;max-width:440px;width:100%;}
.modal-title{font-size:16px;font-weight:900;margin-bottom:8px;}
.modal-text{font-size:12.5px;color:var(--text-dim);line-height:1.6;margin-bottom:12px;}
.modal-text b{color:var(--violet);}
.modal-ta{width:100%;height:110px;background:var(--card2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:10px;font-family:monospace;padding:10px;resize:none;word-break:break-all;}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
</style>
</head>
<body>

<div class="lock-overlay hidden" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title" id="lockTitle">Ingresa tu PIN</div>
  <input class="lock-input" id="lockInput" type="password" inputmode="numeric" maxlength="8" autocomplete="off">
  <div class="lock-err" id="lockErr"></div>
</div>

<button class="lock-btn" id="pushToggle" title="Notificaciones" style="bottom:72px;">🔔</button>
<button class="lock-btn" id="lockToggle" title="Seguridad">🔒</button>

<div class="modal-overlay hidden" id="pushModal">
  <div class="modal-card">
    <div class="modal-title">🔔 Activar notificaciones</div>
    <div class="modal-text">Copia este texto y pégalo en GitHub → Settings → Secrets → Actions, como secret <b>PUSH_SUBSCRIPTION</b>. Así el sistema podrá avisarte de gastos grandes y el resumen semanal.</div>
    <textarea class="modal-ta" id="pushSub" readonly></textarea>
    <div class="modal-actions">
      <button class="icon-btn" id="pushCopy">📋 Copiar</button>
      <button class="icon-btn" id="pushClose">Cerrar</button>
    </div>
  </div>
</div>

<div style="background:rgba(167,139,250,0.08);border-bottom:1px solid rgba(167,139,250,0.2);text-align:center;padding:calc(6px + env(safe-area-inset-top)) 16px 6px;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#A78BFA;">

<div class="month-nav" id="monthNav"></div>

<div class="wrap" id="app"></div>

const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function daysInMonth(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); }
function monthLabel(ym){ const [y,m]=ym.split('-').map(Number); return MONTH_NAMES[m-1]+' '+y; }

const _now = new Date();
const REAL_MONTH = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}`;
// Meses disponibles: los que tienen transacciones + el mes actual real
const availableMonths = [...new Set([...TRANSACTIONS.map(t=>t.date.slice(0,7)), REAL_MONTH])].sort();

/* ===================== STATE ===================== */
let curMonth, DAYS_IN_MONTH, TODAY, LS_EXC, LS_FIJOS, excluded, fijos, MTX;

function setMonth(ym){
  curMonth = ym;
  DAYS_IN_MONTH = daysInMonth(ym);
  TODAY = (ym === REAL_MONTH) ? _now.getDate() : daysInMonth(ym);
  LS_EXC = 'jay_exp_excluded_' + ym.replace('-','_');
  LS_FIJOS = 'jay_exp_fijos_' + ym.replace('-','_');
  excluded = new Set(JSON.parse(localStorage.getItem(LS_EXC) || '[]'));
  fijos = JSON.parse(localStorage.getItem(LS_FIJOS) || 'null') || FIJOS_DEFAULT.map(f=>({...f}));
  MTX = TRANSACTIONS.filter(t => t.date.slice(0,7) === ym);
}
// Arranca en el mes más reciente que tenga transacciones (evita abrir en un mes vacío);
// el mes actual real igual queda disponible en el selector para navegar.
const monthsWithData = [...new Set(TRANSACTIONS.map(t=>t.date.slice(0,7)))].sort();
setMonth(monthsWithData.length ? monthsWithData[monthsWithData.length-1] : REAL_MONTH);

/* ===================== RENDER: GASTOS ===================== */
function filteredTx(){
  const base = (searchAll && filterSearch) ? TRANSACTIONS : MTX;
  return base.filter(t=>{
    if(filterAcct!=='all' && t.acct!==filterAcct) return false;
    if(filterCat!=='all' && t.cat!==filterCat) return false;
    if(filterSearch && !(t.est+t.raw).toLowerCase().includes(filterSearch.toLowerCase())) return false;
    return true;
  });
}

function renderGastos(){
  const tx = filteredTx();
  const total = tx.reduce((s,t)=> excluded.has(t.id) ? s : s+t.amt, 0);
  const excludedCount = tx.filter(t=>excluded.has(t.id)).length;

  // account chips
  const acctTotals = {};
  Object.keys(ACCTS).forEach(a=>acctTotals[a]=0);
  MTX.forEach(t=>{ if(!excluded.has(t.id)) acctTotals[t.acct]+=t.amt; });

  // posibles duplicados: mismo día + cuenta + monto repetido dentro del mes
  const dupCount = {};
  MTX.forEach(t=>{ const k=`${t.date}|${t.acct}|${t.amt.toFixed(2)}`; dupCount[k]=(dupCount[k]||0)+1; });
  const isDup = t => dupCount[`${t.date}|${t.acct}|${t.amt.toFixed(2)}`] > 1;

  // #52 widgets resumen: hoy / semana / mes
  const _today = new Date();
  const todayStr = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;
  const weekAgo = new Date(_today.getTime() - 6*86400000);
  const weekStr = `${weekAgo.getFullYear()}-${String(weekAgo.getMonth()+1).padStart(2,'0')}-${String(weekAgo.getDate()).padStart(2,'0')}`;
  const notExc = t => !excluded.has(t.id);
  const spentToday = TRANSACTIONS.filter(t=>notExc(t)&&t.date===todayStr).reduce((s,t)=>s+t.amt,0);
  const spentWeek = TRANSACTIONS.filter(t=>notExc(t)&&t.date>=weekStr&&t.date<=todayStr).reduce((s,t)=>s+t.amt,0);
  const spentMonth = MTX.reduce((s,t)=> notExc(t) ? s+t.amt : s, 0);

  // group by day
  const groups = {};
  tx.forEach(t=>{ (groups[t.date] = groups[t.date]||[]).push(t); });
  const dates = Object.keys(groups).sort().reverse();

  // seleccionar/deseleccionar todos (excluir del total)
  const allExcluded = tx.length>0 && tx.every(t=>excluded.has(t.id));

  let html = `
  <div class="page-head">
    <div>
      <h1 class="page-title">Gastos</h1>
      <div class="page-sub">${monthLabel(curMonth)} · día ${TODAY}/${DAYS_IN_MONTH}</div>
    </div>
    <div class="head-actions">
      <button class="icon-btn" id="selAllBtn">${allExcluded?'☑ Marcar todos':'☐ Desmarcar todos'}</button>
      <button class="icon-btn" id="syncBtn"><span class="spin-ic">↻</span> Revisar correos</button>
      <button class="icon-btn" id="pngBtn">↓ PNG</button>
    </div>
  </div>

  <div class="widget-row">
    <div class="widget"><div class="widget-label">Hoy</div><div class="widget-value">${fmt(spentToday)}</div></div>
    <div class="widget"><div class="widget-label">7 días</div><div class="widget-value">${fmt(spentWeek)}</div></div>
    <div class="widget"><div class="widget-label">Mes</div><div class="widget-value">${fmt(spentMonth)}</div></div>
  </div>

  <div class="total-card">
    <div class="total-label">Total gastado (no excluido)</div>
    <div class="total-value">${fmt(total)}</div>
    <div class="total-foot">
      ${Object.keys(ACCTS).map(a=>`<span class="total-chip"><span class="dot" style="background:${ACCTS[a].color}"></span>${ACCTS[a].short} · ${fmt(acctTotals[a])}</span>`).join('')}
    </div>
    ${excludedCount>0 ? `<div class="total-foot" style="margin-top:8px;"><span class="total-chip">⊘ ${excludedCount} transacción${excludedCount>1?'es':''} excluida${excludedCount>1?'s':''} del total</span></div>` : ''}
  </div>

  <div class="filters">
    <select id="fAcct">
      <option value="all">Todas las cuentas</option>
      ${Object.keys(ACCTS).map(a=>`<option value="${a}" ${filterAcct===a?'selected':''}>${ACCTS[a].short}</option>`).join('')}
    </select>
    <select id="fCat">
      <option value="all">Todas las categorías</option>
      ${Object.keys(CATS).map(c=>`<option value="${c}" ${filterCat===c?'selected':''}>${CATS[c].icon} ${CATS[c].label}</option>`).join('')}
    </select>
    <input type="text" id="fSearch" placeholder="Buscar establecimiento..." value="${filterSearch}">
    <label class="search-all"><input type="checkbox" id="fAll" ${searchAll?'checked':''}> Todos los meses</label>
  </div>
  ${(searchAll && filterSearch) ? `<div class="search-hint">🔎 Buscando "${filterSearch}" en todos los meses · ${tx.length} resultado${tx.length!==1?'s':''} · ${fmt(total)}</div>` : ''}
  `;

  if(dates.length===0){
    html += `<div class="empty">No hay transacciones con estos filtros.</div>`;
  } else {
    dates.forEach(date=>{
      const items = groups[date].sort((a,b)=> b.time.localeCompare(a.time));
      const dayTotal = items.reduce((s,t)=> excluded.has(t.id) ? s : s+t.amt, 0);
      const d = new Date(date+'T00:00:00');
      const dateLabel = d.toLocaleDateString('es-EC',{weekday:'long', day:'numeric', month:'long'});
      html += `<div class="day-group">
        <div class="day-head"><span class="day-head-date">${dateLabel}</span><span class="day-head-total">${fmt(dayTotal)}</span></div>`;
      items.forEach(t=>{
        const cat = CATS[t.cat];
        const acct = ACCTS[t.acct];
        const isExc = excluded.has(t.id);
        html += `
        <div class="tx-row ${isExc?'excluded':''}">
          <input type="checkbox" class="tx-check" data-id="${t.id}" ${isExc?'checked':''}>
          <span class="tx-cat-dot" style="background:${cat.color}"></span>
          <div class="tx-mid">
            <div class="tx-est">${cat.icon} ${t.est}</div>
            <div class="tx-meta">
              <span>${t.time}</span>
              <span class="acct-badge" style="color:${acct.color}">${acct.short}</span>
              <select class="tx-catsel" data-est="${t.est.replace(/"/g,'&quot;')}" title="Cambiar categoría">
                ${Object.keys(CATS).map(c=>`<option value="${c}" ${t.cat===c?'selected':''}>${CATS[c].icon} ${CATS[c].label}</option>`).join('')}
              </select>
              ${t.note ? `<span class="tx-note">${t.note}</span>` : ''}
              ${isDup(t) ? `<span class="tx-dup">⚠ posible duplicado</span>` : ''}
            </div>
            <div class="tx-raw">${t.raw}</div>
          </div>
          <div class="tx-amt">${fmt(t.amt)}</div>
        </div>`;
      });
      html += `</div>`;
    });
  }

  document.getElementById('app').innerHTML = html;

  document.getElementById('fAcct').addEventListener('change', e=>{ filterAcct=e.target.value; render(); });
  document.getElementById('fCat').addEventListener('change', e=>{ filterCat=e.target.value; render(); });
  document.getElementById('fSearch').addEventListener('input', e=>{ filterSearch=e.target.value; render(); });
  document.getElementById('fAll').addEventListener('change', e=>{ searchAll=e.target.checked; render(); });
  document.getElementById('selAllBtn').addEventListener('click', ()=>{
    const ftx = filteredTx();
    const allExc = ftx.length>0 && ftx.every(t=>excluded.has(t.id));
    if(allExc) ftx.forEach(t=>excluded.delete(t.id));
    else ftx.forEach(t=>excluded.add(t.id));
    saveExcluded();
    toast(allExc?'✓ Todos incluidos':'✓ Todos excluidos del total');
    render();
  });
  document.querySelectorAll('.tx-catsel').forEach(sel=>{
    sel.addEventListener('change', e=>{ setTxCategory(e.target.dataset.est, e.target.value); });
    sel.addEventListener('click', e=>e.stopPropagation());
  });
  document.querySelectorAll('.tx-check').forEach(cb=>{
    cb.addEventListener('change', e=>{
      const id = e.target.dataset.id;
      if(e.target.checked) excluded.add(id); else excluded.delete(id);
      saveExcluded();
      render();
    });
  });
  document.getElementById('syncBtn').addEventListener('click', ()=>{
    const btn = document.getElementById('syncBtn');
    btn.classList.add('spinning');
    btn.disabled = true;
    setTimeout(()=>{
      btn.classList.remove('spinning');
      btn.disabled = false;
      toast('✓ Correo revisado hasta hoy · sin transacciones nuevas');
    }, 1500);
  });
  document.getElementById('pngBtn').addEventListener('click', exportPNG);
}

/* ===================== RENDER: FIJOS ===================== */
function renderFijos(){
  const total = fijos.reduce((s,f)=>s+(parseFloat(f.amt)||0),0);
  const dailyAvg = total / DAYS_IN_MONTH;
  const expected = dailyAvg * TODAY;

  let html = `
  <div class="page-head">
    <div>
      <h1 class="page-title">Fijos</h1>
      <div class="page-sub">Gastos recurrentes mensuales</div>
    </div>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total mensual</div><div class="stat-value">${fmt(total)}</div></div>
    <div class="stat-card"><div class="stat-label">Promedio diario</div><div class="stat-value">${fmt(dailyAvg)}</div></div>
    <div class="stat-card"><div class="stat-label">Esperado a la fecha</div><div class="stat-value">${fmt(expected)}</div></div>
    <div class="stat-card"><div class="stat-label"># de fijos</div><div class="stat-value">${fijos.length}</div></div>
  </div>

  <div id="fijosList"></div>
  <button class="add-fijo-btn" id="addFijoBtn">+ Agregar fijo</button>
  `;
  document.getElementById('app').innerHTML = html;

  const list = document.getElementById('fijosList');
  list.innerHTML = fijos.map(f=>`
    <div class="fijo-row" data-id="${f.id}">
      <input type="text" class="fijo-name" value="${f.name}">
      <input type="number" class="fijo-amt" value="${f.amt}" step="0.01">
      <button class="del-btn" data-id="${f.id}">✕</button>
    </div>
  `).join('');

  list.querySelectorAll('.fijo-name').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const id = e.target.closest('.fijo-row').dataset.id;
      const f = fijos.find(x=>x.id===id);
      f.name = e.target.value;
      saveFijos();
    });
  });
  list.querySelectorAll('.fijo-amt').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const id = e.target.closest('.fijo-row').dataset.id;
      const f = fijos.find(x=>x.id===id);
      f.amt = parseFloat(e.target.value)||0;
      saveFijos();
      renderFijos();
    });

  list.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const id = e.target.dataset.id;
      fijos = fijos.filter(x=>x.id!==id);
      saveFijos();
      renderFijos();
    });
  });
  document.getElementById('addFijoBtn').addEventListener('click', ()=>{
    fijos.push({id:'f'+Date.now(), name:'Nuevo fijo', amt:0});
    saveFijos();
    renderFijos();
  });
}

/* #3 Suscripciones recurrentes: mismo comercio en 2+ meses distintos */
function recurringSubs(){
  const map = {};
  TRANSACTIONS.forEach(t=>{
    const key = t.est.trim().toLowerCase();
    (map[key] = map[key] || {est:t.est, cat:t.cat, months:new Set(), amts:[]});
    map[key].months.add(t.date.slice(0,7));
    map[key].amts.push(t.amt);
  });
  return Object.values(map)
    .filter(s=>s.months.size >= 2)
    .map(s=>({est:s.est, cat:s.cat, count:s.months.size,
              amt: s.amts.reduce((a,b)=>a+b,0)/s.amts.length}))
    .sort((a,b)=> b.count-a.count || b.amt-a.amt);
}

/* ===================== RENDER: ANALISIS ===================== */
function renderAnalisis(){
  const realSpend = MTX.reduce((s,t)=> excluded.has(t.id) ? s : s+t.amt, 0);
  const fijosTotal = fijos.reduce((s,f)=>s+(parseFloat(f.amt)||0),0);
  const dailyAvg = fijosTotal / DAYS_IN_MONTH;
  const expected = dailyAvg * TODAY;
  const projection = (realSpend / TODAY) * DAYS_IN_MONTH;
  const daysRemaining = DAYS_IN_MONTH - TODAY;
  const remainingBudget = fijosTotal - realSpend;
  const dailyAllowance = daysRemaining>0 ? remainingBudget/daysRemaining : remainingBudget;

  let bannerClass='ok', bannerTitle='Dentro del presupuesto', bannerSub='';
  const ratio = expected>0 ? realSpend/expected : 0;
  if(ratio > 1.15){
    bannerClass='over'; bannerTitle='Por encima del presupuesto';
    bannerSub = `Llevas ${fmt(realSpend-expected)} más de lo esperado a esta fecha.`;
  } else if(ratio > 1.0){
    bannerClass='warn'; bannerTitle='Cerca del límite';
    bannerSub = `Llevas ${fmt(realSpend-expected)} más de lo esperado a esta fecha.`;
  } else {
    bannerSub = `Vas ${fmt(expected-realSpend)} por debajo de lo esperado a esta fecha.`;
  }

  const pct = Math.min(100, (realSpend/fijosTotal)*100);

  // daily spend array
  const dailySpend = Array(DAYS_IN_MONTH).fill(0);
  MTX.forEach(t=>{
    if(excluded.has(t.id)) return;
    const day = parseInt(t.date.split('-')[2],10);
    dailySpend[day-1] += t.amt;
  });
  const maxDay = Math.max(...dailySpend, dailyAvg, 1);

  // top categories
  const catTotals = {};
  MTX.forEach(t=>{
    if(excluded.has(t.id)) return;
    catTotals[t.cat] = (catTotals[t.cat]||0) + t.amt;
  });
  const catList = Object.keys(catTotals).map(c=>({c, amt:catTotals[c]})).sort((a,b)=>b.amt-a.amt);
  const maxCat = catList.length ? catList[0].amt : 1;

  // #11 día más caro
  let maxDayIdx = 0;
  dailySpend.forEach((v,i)=>{ if(v > dailySpend[maxDayIdx]) maxDayIdx = i; });
  const costliestDay = dailySpend[maxDayIdx];
  const costliestLabel = new Date(`${curMonth}-${String(maxDayIdx+1).padStart(2,'0')}T00:00:00`)
    .toLocaleDateString('es-EC',{weekday:'long', day:'numeric', month:'long'});

  // #12 ranking de comercios del mes
  const merchTotals = {};
  MTX.forEach(t=>{ if(excluded.has(t.id)) return; merchTotals[t.est]=(merchTotals[t.est]||0)+t.amt; });
  const merchList = Object.keys(merchTotals).map(m=>({m, amt:merchTotals[m]})).sort((a,b)=>b.amt-a.amt).slice(0,8);
  const maxMerch = merchList.length ? merchList[0].amt : 1;

  // #25 meta de ahorro (tope de gasto) editable por mes
  const LS_GOAL = 'jay_exp_goal_' + curMonth.replace('-','_');
  const goal = parseFloat(localStorage.getItem(LS_GOAL)) || fijosTotal;
  const goalPct = Math.min(100, (realSpend/goal)*100);
  const goalOver = realSpend > goal;

  // #3 suscripciones recurrentes
  const subs = recurringSubs();

  // #46 racha de días bajo el presupuesto diario (desde el día más reciente hacia atrás)
  let streak = 0;
  for(let i = TODAY-1; i >= 0; i--){
    if(dailySpend[i] <= dailyAvg) streak++; else break;
  }

  // #53 dona por categoría (segmentos SVG)
  const donutTotal = catList.reduce((s,c)=>s+c.amt,0) || 1;
  let _acc = 0;
  const R = 52, C = 2*Math.PI*R;
  const donutSegs = catList.map(item=>{
    const frac = item.amt/donutTotal;
    const seg = `<circle r="${R}" cx="70" cy="70" fill="none" stroke="${CATS[item.c].color}" stroke-width="20"
      stroke-dasharray="${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}"
      stroke-dashoffset="${(-_acc*C).toFixed(2)}" transform="rotate(-90 70 70)"></circle>`;
    _acc += frac;
    return seg;
  }).join('');

  let html = `
  <div class="page-head">
    <div>
      <h1 class="page-title">Análisis</h1>
      <div class="page-sub">Real vs. presupuesto fijo</div>
    </div>
  </div>

  <div class="banner ${bannerClass}">
    <div class="banner-title">${bannerTitle}</div>
    <div class="banner-sub">${bannerSub}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bannerClass==='over'?'var(--red)':bannerClass==='warn'?'var(--yellow)':'var(--green)'}"></div></div>
    <div class="bar-labels"><span>${fmt(realSpend)} gastado</span><span>${fmt(fijosTotal)} presupuesto</span></div>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Proyección fin de mes</div><div class="stat-value">${fmt(projection)}</div></div>
    <div class="stat-card"><div class="stat-label">Días restantes</div><div class="stat-value">${daysRemaining}</div></div>
    <div class="stat-card"><div class="stat-label">Disponible restante</div><div class="stat-value">${fmt(remainingBudget)}</div></div>
    <div class="stat-card"><div class="stat-label">Margen diario</div><div class="stat-value">${fmt(dailyAllowance)}</div></div>
  </div>

  <div class="section-title">Meta de gasto del mes</div>
  <div class="banner ${goalOver?'over':'ok'}">
    <div class="banner-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>${goalOver?'Meta superada':'Dentro de la meta'}</span>
      <span style="font-size:12px;">$<input type="number" id="goalInput" value="${goal.toFixed(0)}" style="width:80px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-weight:800;padding:4px 8px;text-align:right;"></span>
    </div>
    <div class="bar-track"><div class="bar-fill" style="width:${goalPct}%;background:${goalOver?'var(--red)':'var(--green)'}"></div></div>
    <div class="bar-labels"><span>${fmt(realSpend)} gastado</span><span>${goalOver?fmt(realSpend-goal)+' sobre la meta':fmt(goal-realSpend)+' disponible'}</span></div>
  </div>

  <div class="section-title">Gasto diario · ${monthLabel(curMonth)}</div>
  <div class="chart-wrap">
    <div class="chart-bars">
      <div class="chart-budget-line" style="bottom:${(dailyAvg/maxDay)*100}%"></div>
      ${dailySpend.map((v,i)=>`<div class="chart-bar ${(curMonth===REAL_MONTH && i+1===TODAY)?'today':''} ${i===maxDayIdx&&costliestDay>0?'peak':''}" style="height:${Math.max(2,(v/maxDay)*100)}%" title="Día ${i+1}: ${fmt(v)}"></div>`).join('')}
    </div>
    <div class="chart-x"><span>1</span><span>10</span><span>20</span><span>${DAYS_IN_MONTH}</span></div>
  </div>
  ${costliestDay>0 ? `<div class="insight-line">🔥 Día más caro: <b>${costliestLabel}</b> · ${fmt(costliestDay)}</div>` : ''}

  <div class="section-title">Top comercios del mes</div>
  ${merchList.length ? merchList.map(item=>`<div class="cat-row">
      <span class="cat-name" style="flex:1;">${item.m}</span>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(item.amt/maxMerch)*100}%;background:var(--violet)"></div></div>
      <span class="cat-amt">${fmt(item.amt)}</span>
    </div>`).join('') : `<div class="empty">Sin datos este mes.</div>`}

  ${subs.length ? `<div class="section-title">🔁 Suscripciones recurrentes detectadas</div>
  ${subs.slice(0,12).map(s=>`<div class="cat-row">
      <span class="cat-icon">${CATS[s.cat]?CATS[s.cat].icon:'🔁'}</span>
      <span class="cat-name" style="flex:1;">${s.est} <span style="color:var(--text-dim2);font-weight:600;">· ${s.count} meses</span></span>
      <span class="cat-amt">${fmt(s.amt)}</span>
    </div>`).join('')}
  <div class="insight-line">Estimado recurrente: <b>${fmt(subs.reduce((a,s)=>a+s.amt,0))}</b> / mes aprox.</div>` : ''}

  ${streak>0 ? `<div class="insight-line">🔥 Racha: <b>${streak} día${streak!==1?'s':''}</b> seguidos bajo el presupuesto diario.</div>` : ''}

  <div class="section-title">Distribución por categoría</div>
  <div class="donut-wrap">
    <svg viewBox="0 0 140 140" class="donut">
      ${donutSegs}
      <circle r="42" cx="70" cy="70" fill="var(--card)"></circle>
    </svg>
    <div class="donut-legend">
      ${catList.slice(0,6).map(item=>`<div class="donut-leg"><span class="dot" style="background:${CATS[item.c].color}"></span>${CATS[item.c].label} · ${Math.round(item.amt/donutTotal*100)}%</div>`).join('')}
    </div>
  </div>

  <div class="section-title">Categorías principales</div>
  ${catList.map(item=>{
    const cat = CATS[item.c];
    return `<div class="cat-row">
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat.label}</span>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(item.amt/maxCat)*100}%;background:${cat.color}"></div></div>
      <span class="cat-amt">${fmt(item.amt)}</span>
    </div>`;
  }).join('')}
  `;

  document.getElementById('app').innerHTML = html;

  const gi = document.getElementById('goalInput');
  if(gi) gi.addEventListener('change', e=>{
    const v = parseFloat(e.target.value);
    if(v>0){ localStorage.setItem(LS_GOAL, v); toast('✓ Meta actualizada'); render(); }
  });
}

/* ===================== PNG EXPORT ===================== */
function exportPNG(){
  const realSpend = MTX.reduce((s,t)=> excluded.has(t.id) ? s : s+t.amt, 0);
  const catTotals = {};
  MTX.forEach(t=>{
    if(excluded.has(t.id)) return;
    catTotals[t.cat] = (catTotals[t.cat]||0) + t.amt;
  });
  const catList = Object.keys(catTotals).map(c=>({c, amt:catTotals[c]})).sort((a,b)=>b.amt-a.amt);

  const W = 800, H = 200 + catList.length*54 + 60;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#181725');
  grad.addColorStop(1,'#0D0D1A');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = '#8B889C';
  ctx.font = '700 13px Arial';
  ctx.fillText('GASTOS · ' + monthLabel(curMonth).toUpperCase(), 40, 50);

  ctx.fillStyle = '#F4F3F7';
  ctx.font = '900 46px Arial';
  ctx.fillText('$' + realSpend.toFixed(2), 40, 105);

  ctx.fillStyle = '#5F5C70';
  ctx.font = '600 12px Arial';
  ctx.fillText('Total no excluido · al día ' + TODAY, 40, 130);

  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.moveTo(40,160); ctx.lineTo(W-40,160); ctx.stroke();

  let y = 200;
  catList.forEach(item=>{
    const cat = CATS[item.c];
    ctx.fillStyle = cat.color;
    ctx.beginPath(); ctx.arc(50, y-5, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#F4F3F7';
    ctx.font = '700 14px Arial';
    ctx.fillText(cat.label, 68, y);
    ctx.textAlign = 'right';
    ctx.fillText('$' + item.amt.toFixed(2), W-40, y);
    ctx.textAlign = 'left';

function financeContext(){
  // Arma un resumen en texto del mes activo con datos reales
  const spent = MTX.reduce((s,t)=> excluded.has(t.id)?s:s+t.amt, 0);
  const cat = {};
  MTX.forEach(t=>{ if(!excluded.has(t.id)) cat[t.cat]=(cat[t.cat]||0)+t.amt; });
  const catLines = Object.keys(cat).sort((a,b)=>cat[b]-cat[a])
    .map(c=>`  - ${CATS[c]?CATS[c].label:c}: $${cat[c].toFixed(2)}`).join('\n');
  const fijosTotal = fijos.reduce((s,f)=>s+(parseFloat(f.amt)||0),0);
  const fijosLines = fijos.map(f=>`  - ${f.name}: $${(parseFloat(f.amt)||0).toFixed(2)}`).join('\n');
  const income = parseFloat(localStorage.getItem(LS_INCOME))||0;
  const goal = parseFloat(localStorage.getItem('jay_exp_goal_'+curMonth.replace('-','_')))||fijosTotal;
  let ctx = `Datos financieros de ${monthLabel(curMonth)} (moneda USD):\n`;
  if(income>0) ctx += `Ingreso mensual: $${income.toFixed(2)}\n`;
  ctx += `Gasto total del mes: $${spent.toFixed(2)}\n`;
  ctx += `Meta de gasto del mes: $${goal.toFixed(2)}\n\n`;
  ctx += `Gasto por categoría:\n${catLines}\n\n`;
  ctx += `Gastos fijos mensuales (presupuestados, total $${fijosTotal.toFixed(2)}):\n${fijosLines}\n`;
  return ctx;
}

async function runCoach(key){
  const p = COACH_PROMPTS[key];
  const income = parseFloat(localStorage.getItem(LS_INCOME))||0;
  if(p.needsIncome && income<=0){ toast('Primero ingresa tu ingreso mensual'); return; }
  const prompt = p.build();
  const out = document.getElementById('coachOut');
  const aikey = (localStorage.getItem(LS_AIKEY)||'').trim();
  if(!aikey){
    // Sin API key: mostrar el prompt para copiar y abrir Claude
    out.innerHTML = `<div class="coach-note">Sin API key configurada. Copia este prompt (ya tiene tus datos) y pégalo en Claude:</div>
      <textarea class="coach-ta" id="coachPrompt" readonly>${prompt.replace(/</g,'&lt;')}</textarea>

        <button class="icon-btn" id="coachCopy">📋 Copiar prompt</button>
        <a class="icon-btn" href="https://claude.ai/new" target="_blank" rel="noopener">↗ Abrir Claude</a>
      </div>`;
    document.getElementById('coachCopy').addEventListener('click', ()=>{
      const ta=document.getElementById('coachPrompt'); ta.select();
      navigator.clipboard.writeText(ta.value).then(()=>toast('✓ Prompt copiado')).catch(()=>{document.execCommand('copy');toast('✓ Copiado');});
    });
    return;
  }
  // Con API key: llamar a la API de Anthropic directo
  out.innerHTML = `<div class="coach-note">🧠 Pensando…</div>`;
  try{
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':aikey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-5', max_tokens:1600, messages:[{role:'user', content:prompt}]})
    });
    const data = await r.json();
    if(!r.ok){ out.innerHTML = `<div class="coach-note" style="color:var(--red)">Error: ${(data.error&&data.error.message)||r.status}</div>`; return; }
    const text = (data.content&&data.content[0]&&data.content[0].text)||'(sin respuesta)';
    out.innerHTML = `<div class="coach-answer">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;
  }catch(e){
    out.innerHTML = `<div class="coach-note" style="color:var(--red)">No se pudo conectar: ${e.message}</div>`;
  }
}

function hashPin(p){ let h=5381; for(const c of p) h=((h<<5)+h+c.charCodeAt(0))>>>0; return String(h); }
const lockScreen = document.getElementById('lockScreen');
const lockInput = document.getElementById('lockInput');
const lockErr = document.getElementById('lockErr');
const lockTitle = document.getElementById('lockTitle');
let pinSettingMode = false;

function showLock(setMode){
  pinSettingMode = setMode;
  lockErr.textContent = '';
  lockInput.value = '';
  lockTitle.textContent = setMode ? 'Crea un PIN nuevo (4+ dígitos)' : 'Ingresa tu PIN';
  lockScreen.classList.remove('hidden');
  setTimeout(()=>lockInput.focus(), 50);
}
function hideLock(){ lockScreen.classList.add('hidden'); }

lockInput.addEventListener('keydown', e=>{ if(e.key==='Enter') submitPin(); });
function submitPin(){
  const val = lockInput.value.trim();
  if(pinSettingMode){
    if(val.length < 4){ lockErr.textContent='Mínimo 4 dígitos'; return; }
    localStorage.setItem(LS_PIN, hashPin(val));
    hideLock(); toast('🔒 PIN activado');
  } else {
    if(hashPin(val) === localStorage.getItem(LS_PIN)){ hideLock(); }
    else { lockErr.textContent='PIN incorrecto'; lockInput.value=''; }
  }
}
lockInput.addEventListener('input', ()=>{ if(lockErr.textContent) lockErr.textContent=''; });

function urlB64ToUint8Array(b64){
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const base = (b64 + pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
async function subscribePush(){
